# base.yaml — 基础配置模板，展示模板继承功能
# 其他配置文件可以通过 `base: base.yaml` 继承这些默认值

server:
  port: 8080
  host: "0.0.0.0"
  mode: "release"

database:
  host: "127.0.0.1"
  port: 5432
  name: "myapp"
  user: "postgres"
  password: "postgres"
  max_open_conns: 10
  max_idle_conns: 5

log:
  level: "info"
  format: "json"
  output: "stdout"
